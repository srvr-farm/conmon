services:
  conmon:
    image: ${CONMON_IMAGE_TAG:-conmon:local}
    build:
      context: ..
      dockerfile: Dockerfile
    user: "0:0"
    command: ["-config", "/etc/conmon/config.yml"]
    cap_add:
      - NET_RAW
    volumes:
      - ${CONMON_CONFIG_FILE:-/etc/conmon/config.yml}:/etc/conmon/config.yml:ro
    expose:
      - "9109"
    ports:
      - ${CONMON_METRICS_BIND:-0.0.0.0:9109:9109}
    networks:
      - conmon

  pushgateway:
    image: docker.io/prom/pushgateway:v1.8.0
    ports:
      - ${CONMON_PUSHGATEWAY_BIND:-0.0.0.0:9092:9091}
    expose:
      - "9091"
    networks:
      - conmon

  prometheus:
    image: docker.io/prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=90d
    ports:
      - 127.0.0.1:9091:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${CONMON_DATA_DIR:-/var/lib/conmon}/prometheus:/prometheus
    depends_on:
      - conmon
      - pushgateway
    networks:
      - conmon

  grafana:
    image: docker.io/grafana/grafana-oss:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
    ports:
      - ${CONMON_GRAFANA_BIND:-0.0.0.0:3000:3000}
    volumes:
      - ${CONMON_DATA_DIR:-/var/lib/conmon}/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - conmon

networks:
  conmon:
    driver: bridge
