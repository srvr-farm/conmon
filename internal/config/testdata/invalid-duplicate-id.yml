defaults:
  interval: 30s
  timeout: 5s

groups:
  - name: internet
    checks:
      - id: duplicate-id
        name: First Check
        kind: icmp
        scope: internet
        host: 1.1.1.1

  - name: external
    checks:
      - id: duplicate-id
        name: Second Check
        kind: tcp
        scope: external
        host: example.com
        port: 443

export:
  listen_address: 0.0.0.0:9109
